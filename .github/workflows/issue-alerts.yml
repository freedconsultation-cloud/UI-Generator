name: Issue Alerts

on:
  issues:
    types: [opened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification via ntfy.sh
        run: |
          if [ "${{ github.event.action }}" = "opened" ]; then
            TITLE="New UIGen Issue"
            TAGS="rotating_light"
            PRIORITY="default"
            MSG="${{ github.event.issue.title }} — ${{ github.event.issue.html_url }}"
          else
            TITLE="UIGen Issue Closed"
            TAGS="white_check_mark"
            PRIORITY="low"
            MSG="${{ github.event.issue.title }} — ${{ github.event.issue.html_url }}"
          fi

          curl -s \
            -H "Title: $TITLE" \
            -H "Tags: $TAGS" \
            -H "Priority: $PRIORITY" \
            -H "Click: ${{ github.event.issue.html_url }}" \
            -d "$MSG" \
            "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}"
